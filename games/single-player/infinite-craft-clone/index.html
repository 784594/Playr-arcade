<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Element crafting sandbox with infinite generated combinations." />
  <title>Infinite Craft Clone | PlayR</title>
  <link rel="stylesheet" href="../../shared/game-shell.css" />
  <link rel="stylesheet" href="game.css" />
  <script src="/shared/ads.js"></script>
  <script defer src="/shared/site-footer.js"></script>
  <script defer src="../../shared/game-shell.js"></script>
  <script defer src="game.js"></script>
</head>
<body>
  <div class="page" id="gameRoot" data-game-title="Infinite Craft Clone" data-metric="none" data-direction="asc" data-scope="single-player">
    <div class="top">
      <a class="back-link" href="/">← Back to hub</a>
    </div>

    <section class="craft-layout" aria-label="Infinite Craft Clone play area">
      <aside class="panel owner-tools-panel" id="ownerToolsPanel" hidden>
        <div class="owner-tools-header">
          <div>
            <p class="admin-kicker">Owner tools</p>
            <h2>Infinite Craft Clone Admin</h2>
          </div>
          <p class="hint">owner@playr.io only</p>
        </div>
        <section id="adminPanel" class="admin-panel" hidden>
          <div class="admin-panel-header">
            <div>
              <p class="admin-kicker">Search blocks</p>
              <h2>Block Library</h2>
            </div>
            <p class="hint">Prefix only</p>
          </div>
          <input id="adminSearch" class="room-input admin-search" type="search" placeholder="Type starting letters like r or rock..." autocomplete="off" />
          <p id="adminSearchStatus" class="hint">Type starting letters to search the block list.</p>
          <div id="adminBlockList" class="admin-block-list" aria-live="polite"></div>

          <div class="admin-panel-header">
            <div>
              <p class="admin-kicker">Custom block</p>
              <h2>Create Block</h2>
            </div>
            <p class="hint">Spawns on board</p>
          </div>
          <div class="admin-custom-grid">
            <input id="adminCustomName" class="room-input admin-search" type="text" placeholder="Block name" autocomplete="off" />
            <input id="adminCustomEmoji" class="room-input admin-search" type="text" placeholder="Emoji" maxlength="4" autocomplete="off" />
            <input id="adminCustomTags" class="room-input admin-search admin-custom-tags" type="text" placeholder="Tags, comma, separated" autocomplete="off" />
            <button id="adminCreateCustomBtn" class="toolbar-btn" type="button">Create Block</button>
          </div>
        </section>
      </aside>

      <article class="play-area craft-surface-panel">
        <div class="craft-counter" id="uniqueCounter" aria-live="polite">Unique Crafted: 0</div>
        <div id="workspace" class="craft-workspace" aria-label="Crafting workspace"></div>
      </article>

      <aside class="panel inventory-panel" id="inventoryPanel">
        <div class="sidebar-head">
          <h1 class="sidebar-title">Infinite<br />Craft</h1>
          <p class="sidebar-items">Items <span id="itemCount">4</span></p>
        </div>

        <div class="inventory-search-row">
          <input id="inventorySearch" class="room-input inventory-search" type="text" placeholder="Search items..." autocomplete="off" />
          <button id="clearWorkspaceBtn" class="toolbar-btn trash-btn" type="button" title="Clear board">🗑</button>
        </div>

        <div id="starterQuick" class="starter-quick" aria-label="Starter elements"></div>

        <button class="tip-button" id="tipBanner" type="button" disabled>
          ← Drag elements to craft
        </button>

        <div id="inventoryList" class="inventory-list" aria-live="polite"></div>
      </aside>
    </section>
  </div>
</body>
</html>
